services:
  database:
    image: postgres:16-alpine
    container_name: aleg-database
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-aleg_global}
    ports:
      - "5432:5432"
    volumes:
      # PERSISTENCIA: Nombre semántico oficial
      - aleg_system_data:/var/lib/postgresql/data
      # INICIALIZACIÓN: Mapeo nativo (La clave del éxito)
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aleg-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "root", "-d", "aleg_global" ]
      interval: 10s
      timeout: 5s
      retries: 40
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: aleg-backend
    ports:
      - "3000:3000"
    environment:
      DB_TYPE: postgres
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: aleg_global
    volumes:
      - ./storage:/home/node/app/storage
    depends_on:
      database:
        condition: service_healthy
    networks:
      - aleg-network

  frontend:
    image: node:20-alpine
    container_name: aleg-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: npm run dev -- --host
    depends_on:
      - backend
    networks:
      - aleg-network

networks:
  aleg-network:
    driver: bridge

volumes:
  aleg_system_data:

