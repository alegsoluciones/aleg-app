## 🧠 3. Lógica de Negocio y Multi-Tenancy

### 3.1 Identidad y Contexto (`TenantContext.tsx`)
El sistema resuelve "quién soy" siguiendo una jerarquía estricta para garantizar seguridad y consistencia:
1.  **Tenant Explícito (Switching)**: Si el Super Admin "entra" a una empresa (`localStorage.getItem('currentTenantSlug')`), esta tiene prioridad absoluta.
2.  **Usuario Logueado**: Si no hay override, el sistema obedece al tenant del usuario autenticado (`user.tenant.slug`).
3.  **Fallback Desarrollo**: Solo en local, usa `VITE_DEV_TENANT_ID` (por defecto `clinica-solderma`).

### 3.2 Adaptación de Industria (Industry Adaptation)
El Core se adapta dinámicamente según la "Industria" del Tenant (`CLINICAL` | `VET` | `EVENTS`).
*   **Terminología (`useTerminology.ts`)**:
    *   **CLINICAL (Solderma)**: Paciente, Historia Clínica, Médico.
    *   **VET (Dr. Pets)**: Mascota, Ficha Médica, Propietario.
    *   **EVENTS (Aspeten)**: Staff/Expositor, Bitácora, Coordinador.
*   **Branding (`Sidebar.tsx`)**:
    *   Detecta logos personalizados (URL en `config.theme.logoUrl`).
    *   Si no hay logo, genera iconos temáticos (Azul/Naranja/Morado) dinámicamente.

