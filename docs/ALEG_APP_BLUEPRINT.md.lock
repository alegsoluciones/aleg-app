    Storage <-->|Sync| Twin[JSON Mirrors]
```

### 2.2 Infraestructura (Docker)
*   **Orquestación**: `docker-compose.yml` (Dev) y `docker-compose.prod.yml` (Prod).
*   **Volúmenes**:
