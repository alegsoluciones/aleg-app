services:
  # 🗄️ BASE DE DATOS (Layer 1)
  database:
    image: postgres:16-alpine
    container_name: aleg-database-prod
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-aleg_global}
    volumes:
      - aleg_db_prod_data:/var/lib/postgresql/data
      # En producción, init.sql solo corre si el volumen está vacío
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aleg-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DB_USER:-root}", "-d", "${DB_NAME:-aleg_global}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

  # 🧠 BACKEND API (Layer 2)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aleg-backend-prod
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_TYPE: postgres
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-aleg_global}
      # SWAGGER_ENABLED: "false" # Default in prod
    depends_on:
      database:
        condition: service_healthy
    networks:
      - aleg-network
    restart: always

  # 🎨 FRONTEND SPA (Layer 3)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aleg-frontend-prod
    ports:
      - "80:80" # Único puerto expuesto al mundo
    depends_on:
      - backend
    networks:
      - aleg-network
    restart: always

networks:
  aleg-network:
    driver: bridge

volumes:
  aleg_db_prod_data:
